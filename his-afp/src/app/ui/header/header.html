<header
  class="flex flex-row items-center shadow-md backdrop-opacity-5"
>
  <!-- LOGO -->
  <div
    class="flex items-center justify-center p-1"
  >
    <img alt="logoASUIT" class="w-40" src="logo-asuit.svg">
  </div>
  <!-- AZIENDA: Località + Reparto -->
  <div
    class="pl-1"
  >
    <h1 class="text-4xl font-bold text-primary">{{ reparto }}</h1>
    <p class="text-md text-primary">
      {{ struttura }} -
      @switch (type) {
        @case ('PROD') {
          <p-tag severity="info" value="v{{version}} - {{type}}"/>
        }
        @case ('TEST') {
          <p-tag severity="success" value="v{{version}} - {{type}}"/>
        }
        @case ('SVI') {
          <p-tag severity="contrast" value="v{{version}} - {{type}}"/>
        }
        @case ('LOCAL') {
          <p-tag severity="secondary" value="v{{version}} - {{type}}"/>
        }
      }
    </p>
  </div>

  <!--  DIVIDER-->
  <p-divider layout="vertical"/>
  <!--  <div class="border-amber-600 border-2 h-15 mx-1"></div>-->
  <!-- AZIONI -->
  <nav
    class="flex flex-row items-center gap-3 pl-4"
  >
    <p-button
      label="Lista PZ"
      routerLink="/lista-pz"
      variant="outlined"
    />
    <p-button
      label="Accettazione PZ"
      routerLink="/accettazione-pz"
      variant="outlined"
    />
    <p-button
      label="Stato Servizi"
      routerLink="/stato-servizi"
      variant="outlined"
    />
    
    <p-button
      label="Gestione Personale"
      routerLink="/gestione-personale"
      variant="outlined"
      icon="pi pi-users"
    />
  </nav>

  <div
    class="ml-auto mr-4"
  >
    <his-darckmode-selector/>
  </div>
</header>
